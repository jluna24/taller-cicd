version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci

  pre_build:
    commands:
      - npm test

  build:
    commands:
      - npm run build

  post_build:
    commands:
      - echo "Deploying build artifacts from dist/ ..."
      - echo "Deploy complete. Site is live."

artifacts:
  base-directory: dist
  files:
    - "**/*"

cache:
  paths:
    - node_modules/**/*
